name: smart_student_planner
description: A Smart Student Planner App for managing academic activities.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  animate_do: ^3.3.4
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1       # Load images from internet
  flutter_svg: ^2.0.9                # SVG support
  lottie: ^3.1.0                     # Beautiful animations
  shimmer: ^3.0.0                    # Loading shimmer effect
  url_launcher: ^6.2.4               # Open links

flutter:
  uses-material-design: true
  assets:
    - assets/images/