name: smart_student_planner
description: A Smart Student Planner App for managing academic activities.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2            # Works on web + mobile
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  animate_do: ^3.3.4
  google_fonts: ^6.1.0              # Stylish fonts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true